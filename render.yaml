services:
  # Frontend Web Application (AtlasBridge)
  - type: web
    name: lampad-atlasbridge
    env: static
    buildCommand: npm run build
    publishPath: dist
    headers:
      - key: Cross-Origin-Opener-Policy
        value: same-origin
      - key: Cross-Origin-Embedder-Policy
        value: require-corp

  # Backend Webhook Mapping
  - type: web
    name: lampad-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
