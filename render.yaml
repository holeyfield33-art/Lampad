previewsEnabled: true
services:
  - type: static
    name: lampad-atlasbridge
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_SOS_ENDPOINT
        value: https://lampad-backend.onrender.com/api/sos
      - key: VITE_BACKEND_WEBHOOK_BASE
        value: https://lampad-backend.onrender.com/api
